name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          # Build-time placeholders only. Real secrets live in the host env.
          # These satisfy the fail-fast checks if the auth module is evaluated
          # during the build; they are never used at runtime.
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-at-least-32-chars
          BETTER_AUTH_URL: http://localhost:3000
