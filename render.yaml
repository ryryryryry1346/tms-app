services:
  - type: web
    name: tms-app-web-staging
    runtime: node
    rootDir: web
    plan: starter
    autoDeploy: false
    buildCommand: npm install --include=dev && npm run build
    startCommand: node scripts/start-production.mjs
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: MYSQL_DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: SHORTCUT_API_TOKEN
        sync: false
      - key: SHORTCUT_WORKFLOW_STATE_ID
        sync: false
      - key: SHORTCUT_GROUP_ID
        sync: false
      - key: SHORTCUT_LABEL_NAME
        sync: false
      - key: SHORTCUT_STORY_TYPE
        value: chore
