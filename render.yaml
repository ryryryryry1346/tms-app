services:
  - type: web
    name: tms-app-web-staging
    runtime: node
    rootDir: web
    plan: starter
    autoDeploy: false
    buildCommand: npm install --include=dev && npm run build
    startCommand: ./node_modules/.bin/srvx --prod --entry dist/server/server.js --static dist/client
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: MYSQL_DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
