<!doctype html>
<html>
<head>
  <title>TMS</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f5f7;
      margin: 0;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      background: #ffffff;
      border-right: 1px solid #ddd;
    }

    .sidebar a {
      display: block;
      padding: 10px;
      color: #333;
      text-decoration: none;
    }

    .sidebar a:hover {
      background: #f0f0f0;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      background: #172b4d;
      color: white;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar d-flex justify-content-between">
  <div><strong>TMS</strong></div>
  <div>{{session['user']}}</div>
</div>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h6 class="p-3">Menu</h6>
    <a href="/">📊 Dashboard</a>
    <a href="/create">➕ Create Test</a>
  </div>

  <!-- CONTENT -->
  <div class="content">
    {% block content %}{% endblock %}
  </div>

</div>

</body>
</html>
