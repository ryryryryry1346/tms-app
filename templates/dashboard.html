{% extends "base.html" %}

{% block content %}

<h3>Tests</h3>

<table class="table table-bordered bg-white">
<tr>
  <th>ID</th>
  <th>Title</th>
  <th>Steps</th>
  <th>Expected</th>
  <th>Status</th>
  <th>Priority</th>
  <th>Author</th>
</tr>

{% for t in tests %}
<tr>
  <td>{{t[0]}}</td>
  <td>{{t[1]}}</td>

  <td>{{t[2] | safe}}</td>
  <td>{{t[3] | safe}}</td>

  <td>{{t[4]}}</td>
  <td>{{t[5]}}</td>
  <td>{{t[6]}}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
