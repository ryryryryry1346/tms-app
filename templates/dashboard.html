{% extends "base.html" %}
{% block content %}

<input id="search" class="form-control mb-2" placeholder="Search">

<select id="statusFilter" class="form-select mb-3">
  <option value="">All</option>
  <option>Passed</option>
  <option>Failed</option>
  <option>Blocked</option>
</select>

{% for section in sections %}
<h5>{{section[1]}}</h5>

<div class="section" data-section="{{section[0]}}">

{% for t in tests if t[5] == section[0] %}
<div class="card p-2 mb-2 draggable"
     draggable="true"
     data-id="{{t[0]}}"
     data-title="{{t[1]|lower}}"
     data-status="{{t[4]}}">

<b>{{t[1]}}</b>

<div>
{% for part in t[2].split('<img') %}
  {% if 'src=' in part %}
    {% set src = part.split('src="')[1].split('"')[0] %}
    <img src="{{src}}" class="thumb" onclick="openModal('{{src}}')" loading="lazy">
  {% endif %}
{% endfor %}
</div>

<select id="status_{{t[0]}}">
  <option {% if t[4]=="Passed" %}selected{% endif %}>Passed</option>
  <option {% if t[4]=="Failed" %}selected{% endif %}>Failed</option>
</select>

<button onclick="run({{t[0]}},'Passed')">✔</button>
<button onclick="run({{t[0]}},'Failed')">✗</button>

</div>
{% endfor %}
</div>
{% endfor %}

<!-- modal -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;">
<img id="modalImg" style="max-width:90%;max-height:90%;">
</div>

<script>
function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display="flex";
}
document.getElementById("modal").onclick = ()=> {
  document.getElementById("modal").style.display="none";
}

function run(id,status){
  fetch("/run_test",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({test_id:id,status:status})})
}

// FILTER
function filter(){
  let text = search.value.toLowerCase();
  let status = statusFilter.value;

  document.querySelectorAll(".draggable").forEach(el=>{
    let ok = el.dataset.title.includes(text)
      && (!status || el.dataset.status===status);

    el.style.display = ok?"block":"none";
  });
}

search.oninput = filter;
statusFilter.onchange = filter;

// DRAG
let dragged;
document.querySelectorAll(".draggable").forEach(el=>{
  el.ondragstart=()=>dragged=el;
});
document.querySelectorAll(".section").forEach(sec=>{
  sec.ondragover=e=>e.preventDefault();
  sec.ondrop=()=>{
    sec.appendChild(dragged);
    fetch("/move_test",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        id:dragged.dataset.id,
        section_id:sec.dataset.section
      })});
  };
});
</script>

{% endblock %}
