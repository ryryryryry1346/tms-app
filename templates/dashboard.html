{% extends "base.html" %}
{% block content %}

<input id="search" class="form-control mb-2" placeholder="Search">

{% for section in sections %}
<h5>{{section[1]}}</h5>

{% for t in tests if t[5] == section[0] %}
<div class="card p-2 mb-2">

<a href="/test/{{t[0]}}">
<b>{{t[1]}}</b>
</a>

<div>
{{t[2] | safe}}
</div>

<div class="mt-2">
<button onclick="setStatus({{t[0]}}, 'Passed')" class="btn btn-success btn-sm">✔</button>
<button onclick="setStatus({{t[0]}}, 'Failed')" class="btn btn-danger btn-sm">✗</button>
</div>

</div>
{% endfor %}
{% endfor %}

<script>
function setStatus(id, status){
  fetch("/set_status", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:id, status:status})
  }).then(()=>location.reload());
}
</script>

{% endblock %}
