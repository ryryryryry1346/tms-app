{% extends "base.html" %}

{% block content %}

<h3>Create Test</h3>

<form method="post">

<input name="title" class="form-control mb-2" placeholder="Test name">

<select name="section_id" class="form-select mb-2">
  {% for s in sections %}
    <option value="{{s[0]}}">{{s[1]}}</option>
  {% endfor %}
</select>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<div id="editor_steps" style="height:200px;" class="mb-3"></div>
<input type="hidden" name="steps" id="steps">

<div id="editor_expected" style="height:150px;" class="mb-3"></div>
<input type="hidden" name="expected" id="expected">

<select name="status" class="form-select mb-2">
  <option>Passed</option>
  <option>Failed</option>
  <option>Blocked</option>
</select>

<button class="btn btn-dark">Save</button>

</form>

<script>
var quillSteps = new Quill('#editor_steps', { theme: 'snow' });
var quillExpected = new Quill('#editor_expected', { theme: 'snow' });

function uploadImage(file, quill) {
    let formData = new FormData();
    formData.append("file", file);

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        let range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', data.url);
    });
}

function handleDrop(quill) {
    quill.root.addEventListener("drop", function(e) {
        e.preventDefault();
        for (let file of e.dataTransfer.files) {
            uploadImage(file, quill);
        }
    });
}

handleDrop(quillSteps);
handleDrop(quillExpected);

document.querySelector('form').onsubmit = function() {
    document.querySelector('#steps').value = quillSteps.root.innerHTML;
    document.querySelector('#expected').value = quillExpected.root.innerHTML;
};
</script>

{% endblock %}
